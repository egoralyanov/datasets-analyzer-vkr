server {
    listen 80;
    server_name _;

    # Раздача статики SPA. try_files гарантирует, что неизвестные пути
    # (роуты React Router) отдают index.html — клиентский роутер сам разберётся.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Проксирование запросов к backend (FastAPI) — единый origin, без CORS.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Лимит на загрузку датасетов (см. MAX_FILE_SIZE_MB в .env).
        client_max_body_size 100M;

        # Долгие операции (анализ, baseline, генерация PDF-отчёта) могут
        # отдавать ответ дольше дефолтных 60 секунд — особенно скачивание
        # большого PDF. Расширяем таймаут чтения ответа с upstream'а.
        proxy_read_timeout 120s;
    }
}
