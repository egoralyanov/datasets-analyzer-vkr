# docker-compose.yml — оркестрация трёх сервисов проекта «Анализатор».
# Архитектура: Nginx (frontend, :3000) → FastAPI (backend, :8000) → PostgreSQL (:5432).
# Версия Compose v2: ключ `version` намеренно опущен (deprecated в современных версиях).

services:
  postgres:
    # Образ pgvector/pgvector:pg15 = PostgreSQL 15 с предустановленным расширением pgvector.
    image: pgvector/pgvector:pg15
    container_name: analyzer-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Порт наружу не пробрасываем — БД доступна только из docker-сети.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: analyzer-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Bind-mount для hot-reload при локальной разработке: изменения в backend/
      # сразу подхватываются uvicorn --reload без ребилда образа. На проде/CI
      # эти строки не используются — образ запускается без volumes (см. CMD в Dockerfile).
      - ./backend:/app
      # Пользовательские датасеты и сгенерированные отчёты.
      - ./data:/data
    # Переопределяем CMD из Dockerfile, чтобы включить --reload для разработки.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Порт 8000 наружу не пробрасываем — фронт ходит через nginx-прокси по docker-сети.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # urllib доступен в любой сборке python:3.11-slim, не требует доустановки curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analyzer-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Bind-mount собранного dist в nginx-html. После `npm run build` локально
      # nginx сразу раздаёт свежие ассеты без пересборки образа. На проде/CI
      # эта строка не нужна — образ уже содержит dist через multi-stage build.
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  postgres_data:
